# MOOP — block direct HTTP access to files that are only read server-side.
#
# Deploy to:  /etc/nginx/default.d/<site>-security.conf     (e.g. moop-security.conf)
# It is picked up by BOTH the :80 and :443 server blocks, because each does
# `include /etc/nginx/default.d/*.conf;`. One file, both listeners.
#
# ⚠️  RUNNING A SECOND MOOP ON THIS HOST — this file is NOT portable as-is.
#   The URL prefix below is written as /moop/ throughout. Unlike every other part of MOOP
#   (which now derives its location), nginx `location` directives CANNOT take variables, so
#   a second deployment needs its own copy with its own prefix:
#
#     sed 's#/moop/#/<yoursite>/#g' docs/nginx/moop-security.conf \
#       | sudo tee /etc/nginx/default.d/<yoursite>-security.conf
#     sudo nginx -t && sudo systemctl reload nginx
#
#   Deploy it under a per-site FILENAME (scripts/fix_moop_selinux.sh expects
#   <site>-security.conf), or the second site silently overwrites the first site's guard
#   and BOTH end up protected by only one of them.
#
#   This matters more than it looks: these rules are the only thing stopping a .php written
#   into a writable data tree from executing. A second site deployed without its own copy
#   is served with NO no-exec guard at all. Verify with a real .php, not a 404 — see the
#   VERIFY block at the bottom of this file.
#
# WHY THIS EXISTS
#   config/, logs/, and metadata/ live inside the document root but are internal:
#   PHP reads them from the filesystem, the browser never fetches them. Without
#   these rules they are served to anyone, because nginx will hand out any
#   world-readable file under the docroot. The organisms/ tree is unreachable
#   only by accident (its files are mode 660, which the nginx user cannot read) —
#   do not rely on that for anything else.
#
# WHAT IS DELIBERATELY NOT BLOCKED
#   data/genomes/  — JBrowse fetches .gff3.gz / .tbi from here by URL. Must stay public.
#   jbrowse2/      — the browser app's own static assets (its .js/.css/.html still serve;
#                    only .php is denied there, and there is no legitimate .php in that tree).
#   images/        — banners and cached remote images are displayed in pages. Same deal:
#                    the images still serve, only .php is denied.
#   *.php          — application endpoints elsewhere; still handled by default.d/php.conf.
#
# This file loads before php.conf (alphabetical), so for regex matches these
# deny rules win first — e.g. a request for config/secrets.php is refused here
# rather than executed.

# Version-control metadata and other dotfiles. The negative lookahead keeps
# ACME/Let's Encrypt challenges reachable, in case HTTPS ever moves to certbot.
location ~ /\.(?!well-known) {
    return 404;
}

# Internal directories: config, logs, and all metadata. Return 404 (not 403) so
# we do not even confirm the paths exist.
location ^~ /moop/config/   { return 404; }
location ^~ /moop/logs/     { return 404; }
location ^~ /moop/metadata/ { return 404; }

# users.json — bcrypt password hashes. As of 2026-07-17 it lives OUTSIDE the document root
# (/var/www/moop-private/users.json, config-driven via the users_file key), so nginx never
# serves it. These rules are now defense-in-depth: they deny any stray users.json that ever
# lands back inside the docroot, so a single misplaced copy or `chmod 644` can never publish
# the hashes over HTTP.
location = /users.json      { return 404; }
location ~ ^/.*/users\.json { return 404; }

# Data trees must never EXECUTE code — they hold data the app writes, so a
# compromised php-fpm could otherwise drop a .php webshell and run it. This is the
# execution-layer defense that lets the writable trees stay writable safely, and it is
# what carries the security value here (see notes/MOOP_INDEXES_PLAN.md — making the data
# read-only instead was tried, broke the app's own index building, and was declined).
#
# organisms/ is denied wholesale: nothing legitimately fetches it over HTTP (the app reads
# it server-side; downloads stream through a PHP handler).
location ^~ /moop/organisms/ { return 404; }

# Everywhere else that is BOTH web-served AND writable by php-fpm: serve the data, never
# run PHP. The rule must cover every writable tree under the docroot — a gap is a webshell.
# Verified 2026-07-16: none of these trees contains any legitimate .php file.
#   data/               genomes/ serves .gz/.tbi/.fa to JBrowse by URL
#   images/             wikimedia/ + ncbi_taxonomy/ cache REMOTE downloads (worst case for
#                       this: content the app fetched from elsewhere, landing in a served,
#                       writable dir); banners/ is admin-uploaded
#   jbrowse2/           read-only today, but it is served and must never execute PHP
#   archived_gene_sets/ apache-owned and writable
#
# NOTE: this stops .php only. It does NOT protect .js — which is why jbrowse2/ (whose JS
# every user's browser executes) is kept read-only at the filesystem layer instead.
#   docs/              holds function_registry.json, which the admin "Generate registry"
#                      button REWRITES — so it is web-written and must not execute PHP.
#                      (Verified 2026-07-16: a .php in docs/ returned 200 and ran.)
location ~ ^/moop/(data|images|jbrowse2|archived_gene_sets|docs)/.*\.php$ { return 404; }
