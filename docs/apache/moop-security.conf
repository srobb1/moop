# MOOP — block direct HTTP access to internal files, and stop the data trees
# executing code. Apache equivalent of docs/nginx/moop-security.conf; keep the two
# in step — they must deny the same things.
#
# Deploy to:
#   RHEL/CentOS/Rocky:  /etc/httpd/conf.d/moop-security.conf   then: systemctl reload httpd
#   Debian/Ubuntu:      /etc/apache2/conf-available/moop-security.conf
#                       then: a2enconf moop-security && systemctl reload apache2
#
# Adjust the /moop/ prefix and /var/www/html/moop paths below if your install differs.
#
# ⚠ NOT VERIFIED ON AN APACHE HOST. It was written against a live nginx deployment,
#   where the equivalent rules are tested and confirmed working. The Apache directives
#   here are standard, but nobody has yet run the exec test below on Apache — so run it
#   before trusting this file. See "VERIFY" at the bottom. Please report corrections.
#
# WHY THIS EXISTS
#   MOOP writes into directories that are also served over HTTP (caches, generated
#   indexes, uploaded images). That is safe ONLY while the web server refuses to execute
#   .php inside them: otherwise a single file-write bug in the app becomes a persistent
#   webshell. Do not rely on file permissions for this — a data file that is merely
#   unreadable to the web user is protected by accident, not by design.
#
# WHAT IS DELIBERATELY STILL SERVED
#   data/genomes/  — JBrowse fetches .gff3.gz / .tbi from here by URL.
#   images/        — banners and cached remote images are shown in pages.
#   jbrowse2/      — the browser app's own JS/CSS/HTML.
#   Only .php is denied in those trees; the data itself keeps serving.

# ── Internal directories: PHP reads them from disk, the browser never fetches them ──
RedirectMatch 404 ^/moop/(config|logs|metadata)(/|$)

# ── organisms/: nothing legitimately fetches it over HTTP. The app reads it
#    server-side and downloads stream through a PHP handler. Deny wholesale. ──
RedirectMatch 404 ^/moop/organisms(/|$)

# ── Data trees must never EXECUTE code ──
#    Covers data/ (genomes + tracks), images/ (uploads + remote caches),
#    jbrowse2/ (the app bundle) and archived_gene_sets/.
#    NOTE: this denies .php only — NOT .js. jbrowse2/ holds JavaScript that every
#    user's browser runs, so that tree must ALSO stay read-only on disk; no web-server
#    rule can protect you from injected .js.
#    docs/ is included: function_registry.json there is rewritten by the admin
#    "Generate registry" button, so that tree is web-written too.
RedirectMatch 404 ^/moop/(data|images|jbrowse2|archived_gene_sets|docs)/.*\.(php|phtml|php[0-9])$

# Defense in depth: if a RedirectMatch above is ever loosened or reordered, the access
# check still refuses to hand the file to the PHP handler. Works with both mod_php and
# php-fpm/proxy_fcgi, because it denies at authz time rather than by handler.
<DirectoryMatch "^/var/www/html/moop/(data|images|jbrowse2|archived_gene_sets|docs)(/|$)">
    <FilesMatch "\.(php|phtml|php[0-9])$">
        Require all denied
    </FilesMatch>
</DirectoryMatch>

# ── users.json — bcrypt password hashes ──
# It is meant to live outside the document root, but some installs place it inside.
# Deny it by name so that a stray `chmod 644` cannot publish every password hash.
RedirectMatch 404 (^|/)users\.json$

# ── Version-control metadata and other dotfiles (keeps ACME challenges reachable) ──
RedirectMatch 404 /\.(?!well-known)

# ── VERIFY — do not skip this ──
#   A 404 on a path that does not exist proves nothing. Use a file that WOULD execute,
#   and confirm the identical file still runs from a normal location (the control —
#   otherwise you are only proving the file was unreadable):
#
#     echo '<?php echo "EXECTEST"; ?>' > /var/www/html/moop/images/wikimedia/_exectest.php
#     chmod 644 /var/www/html/moop/images/wikimedia/_exectest.php
#     cp /var/www/html/moop/images/wikimedia/_exectest.php /var/www/html/moop/_exectest.php
#
#     curl -s http://YOUR-HOST/moop/images/wikimedia/_exectest.php   # want: 404
#     curl -s http://YOUR-HOST/moop/_exectest.php                    # want: EXECTEST
#
#     rm -f /var/www/html/moop/images/wikimedia/_exectest.php /var/www/html/moop/_exectest.php
#
#   Then confirm real data still serves (JBrowse depends on it):
#     curl -s -o /dev/null -w '%{http_code}\n' http://YOUR-HOST/moop/jbrowse2/index.html   # 200
